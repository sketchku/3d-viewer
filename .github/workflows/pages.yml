name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir site
          cp index.html styles.css .nojekyll site/
          for f in app.js i18n.js i18n-boot.js web-config.js chat-config.js visitor-chat.js bg-pixels.js stl-loader.js \
            cad2d-loader.js cad-step-convert.js cad-format-guide.js rhino-loader.js \
            large-file-loader.js part-tree.js drawing-export.js viewer-features.js recent-files.js; do
            cp "$f" site/
          done
          if [ -d samples ]; then cp -r samples site/; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4